<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intexus - Acceso CDC</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/estilo_banco.css') }}">
</head>
<body class="login-page">

    <div style="position: absolute; top: 20px; right: 25px;">
        <button class="theme-toggle" title="Cambiar tema">🌗</button>
    </div>

    <div class="login-wrapper">
        <div style="text-align: center; margin-bottom: 30px;">
            <img class="brand-logo" src="{{ url_for('static', filename='img/logo.png') }}" 
                 data-light="{{ url_for('static', filename='img/logo.png') }}" 
                 data-dark="{{ url_for('static', filename='img/logo_blanco.png') }}" 
                 alt="Intexus Logo" style="max-width: 220px;">
        </div>

        <div class="card login-card">
            <h2 style="text-align: center; margin-bottom: 25px;">Acceso al Sistema CDC</h2>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }}">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST">
                <div class="form-group">
                    <label>Usuario corporativo:</label>
                    <input type="text" name="username" class="form-control" required placeholder="Ingresa tu usuario">
                </div>
                
                <div class="form-group" style="margin-top: 15px;">
                    <label>Contraseña:</label>
                    <input type="password" name="password" class="form-control" required placeholder="••••••••">
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 25px; padding: 14px;">Ingresar de forma segura</button>
            </form>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
</body>
</html>
